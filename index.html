<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <div class="site-title">notes</div>

    <section class="note" aria-label="note 16">
      <div class="number">16</div>
      <audio class="player" controls preload="metadata">
        <source src="observation-16.m4a" type="audio/mp4">
      </audio>
      <p class="caption">there wasn't anything to do.</p>
    </section>

    <section class="note" aria-label="note 17">
      <div class="number">17</div>
      <audio class="player" controls preload="metadata">
        <source src="observation-17.m4a" type="audio/mp4">
      </audio>
      <p class="caption">when I first started Second Life.</p>
    </section>
    <section class="feedback">

  <iframe
      data-tally-src="https://tally.so/embed/WOgxvk?alignLeft=1&transparentBackground=1&dynamicHeight=1"
      loading="lazy"
      width="100%"
      height="628"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="Leave me a note">
  </iframe>

</section>
  </main>

  <script
    data-goatcounter="https://silly-goose-rose.goatcounter.com/count"
    async
    src="https://gc.zgo.at/count.js"></script>
  
  <script>
var d=document,w="https://tally.so/widgets/embed.js",v=function(){
  if(typeof Tally!="undefined"){
    Tally.loadEmbeds();
  }else{
    d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){
      e.src=e.dataset.tallySrc;
    });
  }
};
if(typeof Tally!="undefined"){
  v();
}else if(d.querySelector('script[src="'+w+'"]')==null){
  var s=d.createElement("script");
  s.src=w;
  s.onload=v;
  s.onerror=v;
  d.body.appendChild(s);
}
    
</script>
</body>
</html>
