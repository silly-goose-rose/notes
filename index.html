<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>notes</title>

    <!-- Ubuntu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- LEFT COLUMN -->

    <main class="archive">

        <header class="site-header">
            <h1>notes</h1>
        </header>


        <article class="note">

    <h2 class="note-title">
        there wasn't anything to do.
    </h2>

    <div class="audio-player">
        <audio preload="metadata">
            <source src="observation-16.m4a" type="audio/mp4">
        </audio>

        <button
            class="play-button"
            type="button"
            aria-label="Play there wasn't anything to do">
            <span class="play-icon" aria-hidden="true">▶</span>
        </button>

        <div class="audio-progress">
            <input
                class="progress-slider"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                aria-label="Recording progress">
        </div>

        <span class="audio-time">0:00</span>
    </div>

</article>


<article class="note">

    <h2 class="note-title">
        when I first started Second Life.
    </h2>

    <div class="audio-player">
        <audio preload="metadata">
            <source src="observation-17.m4a" type="audio/mp4">
        </audio>

        <button
            class="play-button"
            type="button"
            aria-label="Play when I first started Second Life">
            <span class="play-icon" aria-hidden="true">▶</span>
        </button>

        <div class="audio-progress">
            <input
                class="progress-slider"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                aria-label="Recording progress">
        </div>

        <span class="audio-time">0:00</span>
    </div>

</article>


        <article class="note">

    <h2 class="note-title">
        about flirting + stomach noises
    </h2>

    <div class="audio-player">
        <audio preload="metadata">
            <source src="observation-18.m4a" type="audio/mp4">
        </audio>

        <button
            class="play-button"
            type="button"
            aria-label="Play about flirting + stomach noises">
            <span class="play-icon" aria-hidden="true">▶</span>
        </button>

        <div class="audio-progress">
            <input
                class="progress-slider"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                aria-label="Recording progress">
        </div>

        <span class="audio-time">0:00</span>
    </div>

</article>

    </main>



    <!-- RIGHT COLUMN -->

    <aside class="sidebar">

        <div class="sidebar-inner">

            <iframe
                data-tally-src="https://tally.so/embed/WOgxvk?alignLeft=1&transparentBackground=1&dynamicHeight=1"
                loading="lazy"
                width="100%"
                height="700"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                title="Leave me a note">
            </iframe>

        </div>

    </aside>

</div>



<!-- GoatCounter -->

<script
data-goatcounter="https://silly-goose-rose.goatcounter.com/count"
async
src="https://gc.zgo.at/count.js">
</script>



<!-- Tally -->

<script>

var d=document,
w="https://tally.so/widgets/embed.js",

v=function(){

if(typeof Tally!="undefined"){

Tally.loadEmbeds();

}else{

d.querySelectorAll("iframe[data-tally-src]:not([src])")
.forEach(function(e){

e.src=e.dataset.tallySrc;

});

}

};

if(typeof Tally!="undefined"){

v();

}else if(d.querySelector('script[src="'+w+'"]')==null){

var s=d.createElement("script");

s.src=w;

s.onload=v;

s.onerror=v;

d.body.appendChild(s);

}

</script>

<script src="script.js"></script>

</body>
</html>
